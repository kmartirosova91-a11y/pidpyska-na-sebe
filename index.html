<!DOCTYPE html>

<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Підписка на себе — Тест</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Georgia’, serif;
background: #faf9f7;
color: #2c2c2c;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 20px;
}

.container {
max-width: 640px;
width: 100%;
}

.header {
text-align: center;
margin-bottom: 48px;
}

.header h1 {
font-size: 13px;
letter-spacing: 3px;
text-transform: uppercase;
color: #999;
margin-bottom: 16px;
}

.header h2 {
font-size: 28px;
font-weight: normal;
line-height: 1.4;
color: #1a1a1a;
}

.header p {
margin-top: 16px;
font-size: 16px;
color: #777;
line-height: 1.6;
font-style: italic;
}

.progress-bar {
width: 100%;
height: 2px;
background: #e8e5e0;
margin-bottom: 48px;
border-radius: 2px;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: #2c2c2c;
transition: width 0.4s ease;
}

.question-card {
background: white;
border-radius: 16px;
padding: 40px;
box-shadow: 0 2px 20px rgba(0,0,0,0.06);
margin-bottom: 24px;
}

.question-number {
font-size: 12px;
letter-spacing: 2px;
text-transform: uppercase;
color: #bbb;
margin-bottom: 20px;
}

.question-text {
font-size: 20px;
line-height: 1.5;
color: #1a1a1a;
margin-bottom: 32px;
}

.options {
display: flex;
flex-direction: column;
gap: 12px;
}

.option {
padding: 16px 20px;
border: 1.5px solid #e8e5e0;
border-radius: 10px;
cursor: pointer;
font-size: 15px;
line-height: 1.5;
color: #444;
transition: all 0.2s ease;
text-align: left;
background: white;
}

.option:hover {
border-color: #2c2c2c;
color: #1a1a1a;
transform: translateY(-1px);
}

.option.selected {
border-color: #2c2c2c;
background: #2c2c2c;
color: white;
}

.nav-btn {
width: 100%;
padding: 18px;
background: #2c2c2c;
color: white;
border: none;
border-radius: 10px;
font-size: 16px;
cursor: pointer;
transition: all 0.2s ease;
font-family: inherit;
letter-spacing: 0.5px;
}

.nav-btn:hover {
background: #1a1a1a;
transform: translateY(-1px);
}

.nav-btn:disabled {
background: #ddd;
color: #aaa;
cursor: not-allowed;
transform: none;
}

/* Results */
.result-card {
background: white;
border-radius: 16px;
padding: 48px 40px;
box-shadow: 0 2px 20px rgba(0,0,0,0.06);
text-align: center;
display: none;
}

.result-emoji {
font-size: 48px;
margin-bottom: 24px;
}

.result-title {
font-size: 24px;
font-weight: normal;
color: #1a1a1a;
margin-bottom: 16px;
line-height: 1.4;
}

.result-subtitle {
font-size: 15px;
color: #999;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 24px;
}

.result-text {
font-size: 16px;
line-height: 1.8;
color: #555;
margin-bottom: 32px;
}

.result-cta {
padding: 18px 32px;
background: #2c2c2c;
color: white;
border: none;
border-radius: 10px;
font-size: 16px;
cursor: pointer;
font-family: inherit;
transition: all 0.2s ease;
display: inline-block;
}

.result-cta:hover {
background: #1a1a1a;
transform: translateY(-1px);
}

.score-dots {
display: flex;
justify-content: center;
gap: 8px;
margin-bottom: 32px;
flex-wrap: wrap;
}

.dot {
width: 10px;
height: 10px;
border-radius: 50%;
background: #e8e5e0;
}

.dot.filled {
background: #2c2c2c;
}

@media (max-width: 480px) {
.question-card, .result-card { padding: 28px 24px; }
.question-text { font-size: 18px; }
.header h2 { font-size: 22px; }
}
</style>

</head>
<body>
<div class="container">
  <div class="header" id="header">
    <h1>Підписка на себе</h1>
    <h2>Ти справді живеш чи просто виживаєш?</h2>
  </div>
  <p style="font-size: 14px; color: #bbb; text-align: center; margin-bottom: 24px;">10 запитань · 3 хвилини</p>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
  </div>

  <div class="question-card" id="introCard">
    <div class="question-number">Перш ніж почати</div>
    <div class="question-text">Перед кожною відповіддю зроби паузу</div>
    <p style="font-size: 16px; color: #666; line-height: 1.8; margin-top: -16px;">
      Не питай себе що <em>правильно</em> — питай що <em>чесно</em><br><br>
      Твій мозок захоче справити гарне враження<br><br>
      Не вір йому 😏
    </p>
  </div>

  </div>

  <div class="question-card" id="zeroCard" style="display:none;">
    <div class="question-number">Питання 0</div>
    <div class="question-text" id="zeroQuestionText"></div>
    <div class="options" id="zeroOptionsContainer"></div>
  </div>

  <div class="question-card" id="questionCard">
    <div class="question-number" id="questionNumber">Питання 1 з 10</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
  </div>

<button class="nav-btn" id="nextBtn" disabled onclick="nextQuestion()">Далі →</button>

  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-subtitle" id="resultSubtitle" style="font-style: italic; font-size: 16px; color: #888; margin-bottom: 24px; letter-spacing: 0; text-transform: none;"></div>
    <div class="score-dots" id="scoreDots"></div>
    <div id="mirrorText" style="display:none; font-size: 15px; color: #2c2c2c; background: #f5f3f0; padding: 16px 20px; border-radius: 10px; line-height: 1.7; margin-bottom: 24px; font-style: italic;"></div>
    <div class="result-text" id="resultText"></div>
    <button class="result-cta" onclick="window.location.reload()">Пройти ще раз</button>
  </div>
</div>

<script>
const zeroQuestion = {
  text: "Як ти зараз відчуваєш себе, незалежно від того, що відбувається навколо?",
  options: [
    { text: "Розгублено. Щось не так, але не розумію що", level: 0 },
    { text: "Рухаюсь, але є відчуття, що щось важливе губиться по дорозі", level: 1 },
    { text: "В контакті з собою. Знаю, хто я і куди йду", level: 2 },
  ]
};

let zeroAnswer = null;

function shuffle(arr) {
  return arr.map(a => ({ ...a, _sort: Math.random() })).sort((a, b) => a._sort - b._sort);
}

const questions = [
  {
    text: "Пригадай момент, коли досягла(-в) чогось, що дуже хотіла(-в). Що відчувала(-в) наступного ранку?",
    options: shuffle([
      { text: "Порожнечу. І думку - що далі?", score: 2 },
      { text: "Полегшення. Нарешті", score: 1 },
      { text: "Наповненість. Віра в себе зміцнілась - і це залишилось", score: 0 },
    ])
  },
  {
    text: "Пригадай момент, коли хтось близький просив про допомогу - а ти втомлена(-ий) або зайнята(-ий). Що відбулось?",
    options: shuffle([
      { text: "Допомогла(-ів). Потім злилась(-ся) на себе, що не відмовила(-в)", score: 2 },
      { text: "Відмовила(-в), але довго крутила(-в) це в голові", score: 1 },
      { text: "Спокійно сказала(-в), що зараз не можу — і відпустила(-в)", score: 0 },
    ])
  },
  {
    text: "Пригадай, коли зробила(-в) щось тільки для себе - без користі, без пояснень, попри думку інших. Що це було?",
    options: shuffle([
      { text: "Довго думаю… і не можу згадати конкретного прикладу", score: 2 },
      { text: "Щось є, але це було давно або дрібниця", score: 1 },
      { text: "Є конкретний приклад - і мені не потрібно було це виправдовувати", score: 0 },
    ])
  },
  {
    text: "Пригадай щось важливе, що відкладаєш вже рік або більше. Що відбувається, коли про це думаєш?",
    options: shuffle([
      { text: "З'являється список причин, чому ще не час - і я їм вірю", score: 2 },
      { text: "Розумію, що хочу, але щось зупиняє — і я не знаю що", score: 1 },
      { text: "Хочу - значить вже рухаюсь", score: 0 },
    ])
  },
  {
    text: "Пригадай, коли сказала(-в) «ні» і відчула(-в) провину. Довго це тривало?",
    options: shuffle([
      { text: "Виправдовувала(-в) себе ще кілька годин", score: 2 },
      { text: "Трохи кололо, але швидко минуло", score: 1 },
      { text: "Такого не буває. «Ні» — це просто «ні»", score: 0 },
    ])
  },
  {
    text: "Уяви, що завтра зникають всі твої ролі — партнерка(-ер), мати/батько, колега. Хто залишається?",
    options: shuffle([
      { text: "Чесно? Не дуже розумію, хто я без цього", score: 2 },
      { text: "Щось є, але розмито", score: 1 },
      { text: "Я. Чітко і без сумнівів", score: 0 },
    ])
  },
  {
    text: "Пригадай щось, що пішло не так нещодавно. Яка була перша думка?",
    options: shuffle([
      { text: "Я сама(-ий) винна(-ий). Треба було краще", score: 2 },
      { text: "Чому це взагалі сталось?", score: 1 },
      { text: "Що я можу зробити прямо зараз?", score: 0 },
    ])
  },
  {
    text: "Пригадай, коли отримала(-в) щось хороше (подарунок, комплімент, допомогу) просто так — без причини. Перше відчуття?",
    options: shuffle([
      { text: "Ніяково. Я ж нічого не зробила(-в)", score: 2 },
      { text: "Нічого особливого. Прийняла(-в) і все", score: 1 },
      { text: "Насолоду. Прийняла(-в) і зраділа(-в) з вдячністю", score: 0 },
    ])
  },
  {
    text: "Є речі, які ти хочеш — але одразу думаєш: «чи варто, чи доречно, що скажуть». Пригадай одну таку річ. Що відчуваєш?",
    options: shuffle([
      { text: "Це одразу гаситься. Навіть не даю собі помріяти про це", score: 2 },
      { text: "Хочу, але невпевнена(-ий), що це реально", score: 1 },
      { text: "Хочу - і цього достатньо", score: 0 },
    ])
  },
  {
    text: "Пригадай, коли зупинилась(-ся) і по-справжньому поговорила(-в) із собою. Коли це було?",
    options: shuffle([
      { text: "Не пам'ятаю. Завжди є щось важливіше", score: 2 },
      { text: "Буває, але швидко переключаюсь на щось інше", score: 1 },
      { text: "Регулярно. Це моя практика", score: 0 },
    ])
  },
];

const results = [
  {
    min: 0, max: 6,
    emoji: "☀️",
    title: "Ясно",
    subtitle: "Але навіть в ясну погоду буває, що щось непомітне ховається в тіні 😏",
    text: "Ти рухаєшся в правильному напрямку — і це відчувається. Контакт із собою є. Але якщо щось в цих питаннях кольнуло хоч на хвильку — не ігноруй. Саме там часто ховається найцікавіше. Якщо цікаво дослідити — дай знати 😏"
  },
  {
    min: 7, max: 13,
    emoji: "⛅️",
    title: "Хмарно з проясненнями",
    subtitle: "Щось вже видно, щось ще в тумані. Саме час розібратись",
    text: "Ти вже відчуваєш, що є нестиковка. Між тим, що хочеш і тим, що відбувається насправді. Між тим, хто ти є і тим, як живеш. Це не страшно — це точка входу. Якщо хочеш більше ясності — приходь, подивимось разом 😏"
  },
  {
    min: 14, max: 20,
    emoji: "⛈️",
    title: "Йой, очікується гроза",
    subtitle: "Але гроза — це не катастрофа. Це коли нарешті проллється те, що накопичилось. Після грози завжди свіжіше 😏",
    text: "Ти думала(-в), що все норм. А тепер дивишся на свої відповіді, і щось всередині впізнає себе. Можливо вперше так чітко. Ти не погана(-ий) і не нечесна(-ий), просто звикла(-в) ставити всіх вище себе. Настав час подивитись на себе уважніше і зробити генеральне прибирання. Пиши мені — разом розберемось, що там насправді 😏"
  }
];

let current = 0;
let answers = [];
let totalScore = 0;

function init() {
  showQuestion(0);
}

function showQuestion(index) {
  const q = questions[index];
  document.getElementById('questionNumber').textContent = `Питання ${index + 1} з ${questions.length}`;
  document.getElementById('questionText').textContent = q.text;
  
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.onclick = () => selectOption(i, opt.score);
    if (answers[index] === i) btn.classList.add('selected');
    container.appendChild(btn);
  });

  document.getElementById('progressFill').style.width = `${(index / questions.length) * 100}%`;
  document.getElementById('nextBtn').disabled = answers[index] === undefined;
  document.getElementById('nextBtn').textContent = index === questions.length - 1 ? 'Побачити результат →' : 'Далі →';
}

function selectOption(optionIndex, score) {
  answers[current] = optionIndex;
  
  document.querySelectorAll('.option').forEach((btn, i) => {
    btn.classList.toggle('selected', i === optionIndex);
  });
  
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    showQuestion(current);
  } else {
    showResult();
  }
}

function showResult() {
  totalScore = answers.reduce((sum, answerIndex, qIndex) => {
    return sum + (questions[qIndex].options[answerIndex]?.score || 0);
  }, 0);

  const result = results.find(r => totalScore >= r.min && totalScore <= r.max);

  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('header').style.display = 'none';

  const rc = document.getElementById('resultCard');
  rc.style.display = 'block';

  document.getElementById('resultEmoji').textContent = result.emoji;
  document.getElementById('resultTitle').textContent = result.title;
  document.getElementById('resultSubtitle').textContent = result.subtitle;

  // Mirror logic
  let mirrorText = '';
  const resultLevel = totalScore <= 6 ? 2 : totalScore <= 13 ? 1 : 0;
  if (zeroAnswer !== null) {
    if (zeroAnswer === 2 && resultLevel === 0) {
      mirrorText = '🪞 На початку ти сказала(-в) що в контакті з собою. А тепер подивись на відповіді 😏 Іноді ми не помічаємо того що найближче.';
    } else if (zeroAnswer === 0 && resultLevel === 2) {
      mirrorText = '🪞 На початку ти відчувала(-в) що щось не так. Але твої відповіді кажуть інше — ти себе знаєш краще ніж думаєш 🙂';
    } else {
      mirrorText = '🪞 Ти відчувала(-в) це ще до початку. Тепер є підтвердження 🙂';
    }
  }

  document.getElementById('resultText').textContent = result.text;

  const mirrorEl = document.getElementById('mirrorText');
  if (mirrorText) {
    mirrorEl.textContent = mirrorText;
    mirrorEl.style.display = 'block';
  } else {
    mirrorEl.style.display = 'none';
  }

  const dotsContainer = document.getElementById('scoreDots');
  dotsContainer.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i < totalScore ? ' filled' : '');
    dotsContainer.appendChild(dot);
  }
}

let showingIntro = true;
let showingZero = false;

function init() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('zeroCard').style.display = 'none';
  document.getElementById('introCard').style.display = 'block';
  document.getElementById('nextBtn').disabled = false;
  document.getElementById('nextBtn').textContent = 'Починаємо →';

  // Setup zero question
  document.getElementById('zeroQuestionText').textContent = zeroQuestion.text;
  const zeroContainer = document.getElementById('zeroOptionsContainer');
  zeroContainer.innerHTML = '';
  zeroQuestion.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.text;
    btn.onclick = () => {
      zeroAnswer = opt.level;
      document.querySelectorAll('#zeroOptionsContainer .option').forEach((b, j) => {
        b.classList.toggle('selected', i === j);
      });
      document.getElementById('nextBtn').disabled = false;
    };
    zeroContainer.appendChild(btn);
  });
}

function nextQuestion() {
  if (showingIntro) {
    showingIntro = false;
    showingZero = true;
    document.getElementById('introCard').style.display = 'none';
    document.getElementById('zeroCard').style.display = 'block';
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('nextBtn').textContent = 'Далі →';
    return;
  }
  if (showingZero) {
    showingZero = false;
    document.getElementById('zeroCard').style.display = 'none';
    document.getElementById('questionCard').style.display = 'block';
    document.getElementById('progressBar').style.display = 'block';
    showQuestion(0);
    return;
  }
  if (current < questions.length - 1) {
    current++;
    showQuestion(current);
  } else {
    showResult();
  }
}

init();
</script>

</body>
</html>
